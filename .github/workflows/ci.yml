name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + mypy + ruff (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy strict
        run: mypy --strict src/

      - name: Pytest + coverage
        run: pytest tests/ -v --cov=src/lre --cov-report=term-missing

  wheel:
    # Build a wheel and confirm that `lre demo` runs end-to-end from a
    # clean install — this catches the class of bug where prompt JSONL
    # data ships outside the package and is never found at runtime.
    name: Wheel install smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel in a clean venv and run demo
        run: |
          python -m venv /tmp/wheel-test-venv
          /tmp/wheel-test-venv/bin/pip install dist/*.whl
          /tmp/wheel-test-venv/bin/lre demo
